name: Generate READMEs

on:
  workflow_dispatch:
    inputs:
      scan_all:
        description: 'Generate READMEs for all .cpp files missing one'
        required: false
        default: 'true'

jobs:
  gen-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find .cpp files needing a README
        id: find
        run: |
          ALL=$(find codeforces cses -name "*.cpp" -o -name "*.cc" -o -name "*.cxx" 2>/dev/null | sort || true)

          NEEDS=""
          for f in $ALL; do
            base="${f%.*}"
            fname=$(basename "$f" | sed 's/\.[^.]*$//')
            if [ "$fname" = "Template" ]; then continue; fi
            if [ -f "${base}.md" ]; then continue; fi
            NEEDS="$NEEDS $f"
          done
          NEEDS="${NEEDS## }"
          echo "needs=$NEEDS" >> "$GITHUB_OUTPUT"
          echo "Files needing README: $NEEDS"

      - name: Refresh CSES category map (docs/cses-categories.js)
        run: node .github/scripts/update-cses-categories.js

      - name: Generate READMEs via GitHub Models (gpt-4o)
        if: steps.find.outputs.needs != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in ${{ steps.find.outputs.needs }}; do
            echo "Generating README for $f"
            node .github/scripts/gen-readme.js "$f"
          done

      - name: Commit generated READMEs and category map
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/cses-categories.js '**/*.md'
          git diff --staged --quiet || git commit -m "docs: refresh CSES categories + auto-generate READMEs [skip ci]"
          git push
